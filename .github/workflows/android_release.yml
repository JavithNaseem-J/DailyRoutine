name: Android Release Build

env:
  FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: true

on:
  push:
    branches:
      - main
  workflow_dispatch:

jobs:
  build:
    name: Build Android App Bundle & APK
    runs-on: ubuntu-latest

    steps:
      - name: Checkout Code
        uses: actions/checkout@v4

      - name: Setup Java
        uses: actions/setup-java@v4
        with:
          distribution: 'zulu'
          java-version: '17'

      - name: Setup Flutter
        uses: subosito/flutter-action@v2
        with:
          channel: 'stable'

      - name: Decode Keystore & Verify
        working-directory: ./app
        env:
          KEYSTORE_BASE64: ${{ secrets.KEYSTORE_BASE64 }}
        run: |
          echo "$KEYSTORE_BASE64" | base64 -d > android/app/yawmi-release.jks
          echo "Keystore decoded. Size: $(wc -c < android/app/yawmi-release.jks) bytes"
          keytool -list -keystore android/app/yawmi-release.jks \
            -storepass "${{ secrets.KEYSTORE_PASSWORD }}" \
            -noprompt 2>&1 | head -5

      - name: Install Dependencies
        working-directory: ./app
        run: flutter pub get

      - name: Build Android App Bundle (AAB for Play Store)
        working-directory: ./app
        env:
          KEYSTORE_PASSWORD: ${{ secrets.KEYSTORE_PASSWORD }}
          KEY_ALIAS: ${{ secrets.KEY_ALIAS }}
          KEY_PASSWORD: ${{ secrets.KEY_PASSWORD }}
        run: |
          flutter build appbundle --release \
            --dart-define=SUPABASE_URL="${{ secrets.SUPABASE_URL }}" \
            --dart-define=SUPABASE_ANON_KEY="${{ secrets.SUPABASE_ANON_KEY }}" \
            --dart-define=SENTRY_DSN="${{ secrets.SENTRY_DSN }}"

      - name: Build Android APK (For testing)
        working-directory: ./app
        env:
          KEYSTORE_PASSWORD: ${{ secrets.KEYSTORE_PASSWORD }}
          KEY_ALIAS: ${{ secrets.KEY_ALIAS }}
          KEY_PASSWORD: ${{ secrets.KEY_PASSWORD }}
        run: |
          flutter build apk --release \
            --dart-define=SUPABASE_URL="${{ secrets.SUPABASE_URL }}" \
            --dart-define=SUPABASE_ANON_KEY="${{ secrets.SUPABASE_ANON_KEY }}" \
            --dart-define=SENTRY_DSN="${{ secrets.SENTRY_DSN }}"

      - name: Rename output files to yawmi
        working-directory: ./app
        run: |
          cp build/app/outputs/bundle/release/app-release.aab yawmi.aab
          cp build/app/outputs/flutter-apk/app-release.apk yawmi.apk

      - name: Upload Artifacts
        uses: actions/upload-artifact@v4
        with:
          name: android-release-artifacts
          path: |
            app/yawmi.aab
            app/yawmi.apk
