name: yawmi
description: "A mobile application for daily routine and focus management."
publish_to: 'none'

version: 1.0.1+2

environment:
  sdk: ^3.9.0

dependencies:
  flutter:
    sdk: flutter

  flutter_riverpod: ^3.3.1
  go_router: ^17.2.0
  supabase_flutter: ^2.12.2
  hive: ^2.2.3
  hive_flutter: ^1.1.0
  shared_preferences: ^2.5.5
  google_fonts: ^8.0.2
  adhan: ^2.0.0+1
  flutter_local_notifications: ^20.1.0
  timezone: ^0.10.1
  fl_chart: ^1.2.0
  uuid: ^4.5.3
  quran: ^1.3.3
  http: ^1.2.0
  confetti: ^0.8.0
  audioplayers: ^6.6.0
  sentry_flutter: ^9.18.0
  geolocator: ^14.0.2
  geocoding: ^4.0.0  # used in settings_screen for prayer location display
  url_launcher: ^6.3.2 # used in settings_screen
  cached_network_image: ^3.4.1 # used in quran screen

dev_dependencies:
  flutter_test:
    sdk: flutter
  flutter_lints: ^5.0.0
  flutter_launcher_icons: ^0.14.4
  flutter_native_splash: ^2.4.7
  image: ^4.8.0

flutter:
  uses-material-design: true

  assets:
    # Secrets must NOT be bundled — use --dart-define at build time.
    - assets/images/app_icon.png
    - assets/sounds/
